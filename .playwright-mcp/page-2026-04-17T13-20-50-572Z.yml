      - paragraph [ref=e62]: Stop scrolling Netflix for 45 minutes and watching nothing. We picked every Best Picture nominee since 1970, every International and Animated Feature winner, plus 438 essential films the Academy missed (curated across 7 canon lists — Sight & Sound, Criterion, IMDb, Letterboxd, AFI, festival grand prizes, National Film Registry) — 837 films total — and put them in a random order so you don't have to think. Just press play.
      - paragraph [ref=e63]: The journey mixes genres, decades, and categories so you never watch two similar films back-to-back. Rate every film, battle them head-to-head, and see how your taste compares with friends.
