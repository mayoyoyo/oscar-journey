  <!-- Arms -->
  <rect x="16" y="18" width="10" height="3" rx="1.5" fill="url(#gold)" transform="rotate(-20 21 19.5)"/>
  <rect x="38" y="18" width="10" height="3" rx="1.5" fill="url(#gold)" transform="rotate(20 43 19.5)"/>
  <!-- Sword/detail -->
